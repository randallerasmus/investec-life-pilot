<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">LifePilot product banner</title>
  <desc id="desc">A colorful dashboard-style banner for LifePilot showing a financial path, safe-to-spend card, and life event simulation elements.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111F"/>
      <stop offset="0.48" stop-color="#0E3B43"/>
      <stop offset="1" stop-color="#123C69"/>
    </linearGradient>
    <linearGradient id="accent" x1="145" y1="92" x2="1050" y2="330" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00E0A4"/>
      <stop offset="0.5" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#FACC15"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="1200" height="420" rx="30" fill="url(#bg)"/>
  <path d="M72 326C197 214 287 272 387 190C516 84 607 247 724 154C856 49 944 120 1128 70" stroke="url(#accent)" stroke-width="8" stroke-linecap="round" opacity="0.95"/>
  <path d="M70 332C202 241 310 313 423 230C550 137 649 281 760 199C900 96 987 176 1129 135" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" opacity="0.16"/>

  <g filter="url(#softShadow)">
    <rect x="84" y="74" width="374" height="204" rx="22" fill="#FFFFFF" fill-opacity="0.96"/>
    <text x="120" y="126" fill="#102033" font-family="Segoe UI, Arial, sans-serif" font-size="25" font-weight="700">LifePilot</text>
    <text x="120" y="157" fill="#516173" font-family="Segoe UI, Arial, sans-serif" font-size="15">Real available money after life events</text>
    <rect x="120" y="187" width="284" height="14" rx="7" fill="#D7F7ED"/>
    <rect x="120" y="187" width="188" height="14" rx="7" fill="#00B887"/>
    <text x="120" y="238" fill="#102033" font-family="Segoe UI, Arial, sans-serif" font-size="36" font-weight="800">ZAR 3,420</text>
    <text x="120" y="262" fill="#667789" font-family="Segoe UI, Arial, sans-serif" font-size="14">Projected safe-to-spend</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="742" y="92" width="346" height="240" rx="24" fill="#102033" fill-opacity="0.88"/>
    <text x="779" y="139" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="21" font-weight="700">Scenario Simulator</text>
    <text x="779" y="168" fill="#B7D1DF" font-family="Segoe UI, Arial, sans-serif" font-size="15">Private school fees</text>
    <g>
      <rect x="779" y="197" width="258" height="42" rx="12" fill="#173D52"/>
      <circle cx="803" cy="218" r="9" fill="#FACC15"/>
      <text x="824" y="224" fill="#E7F6FF" font-family="Segoe UI, Arial, sans-serif" font-size="14">Monthly impact: ZAR 6,500</text>
    </g>
    <g>
      <rect x="779" y="251" width="258" height="42" rx="12" fill="#173D52"/>
      <circle cx="803" cy="272" r="9" fill="#38BDF8"/>
      <text x="824" y="278" fill="#E7F6FF" font-family="Segoe UI, Arial, sans-serif" font-size="14">Risk level: TIGHT</text>
    </g>
  </g>

  <g opacity="0.95">
    <circle cx="602" cy="178" r="44" fill="#00E0A4"/>
    <path d="M589 178L599 188L618 166" stroke="#082031" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="544" y="250" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Plan before you commit</text>
  </g>

  <g opacity="0.28">
    <circle cx="109" cy="351" r="6" fill="#FFFFFF"/>
    <circle cx="218" cy="54" r="5" fill="#FFFFFF"/>
    <circle cx="655" cy="76" r="7" fill="#FFFFFF"/>
    <circle cx="1112" cy="343" r="6" fill="#FFFFFF"/>
  </g>
</svg>
